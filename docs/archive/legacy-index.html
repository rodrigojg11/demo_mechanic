* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
body { overflow-x: hidden; transition: background-color .4s ease, color .4s ease; }
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; }

::selection { background: var(--gold); color: #0a0a0a; }

body::before {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: var(--grain-opacity);
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.8'/></svg>");
  mix-blend-mode: overlay;
}

.eyebrow {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: .28em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--gold);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before {
  content: "";
  width: 28px; height: 1px;
  background: var(--gold);
  display: inline-block;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 16px 28px;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: .18em;
  text-transform: uppercase;
  border: 1px solid var(--gold);
  background: var(--gold);
  color: #0a0a0a;
  transition: all .25s ease;
  cursor: pointer;
}
.btn:hover { background: var(--gold-2); border-color: var(--gold-2); transform: translateY(-1px); }
.btn--ghost { background: transparent; color: var(--ink); border-color: var(--line-2); }
.btn--ghost:hover { border-color: var(--gold); color: var(--gold); background: transparent; transform: translateY(-1px); }
.btn--block { width: 100%; justify-content: center; }

.section { padding: 120px 48px; position: relative; }
@media (max-width: 720px) { .section { padding: 80px 20px; } }

.container { max-width: 1280px; margin: 0 auto; }

.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity .8s cubic-bezier(.22,.61,.36,1), transform .8s cubic-bezier(.22,.61,.36,1);
}
.reveal.in { opacity: 1; transform: none; }

#boot {
  position: fixed; inset: 0;
  background: #0a0a0a;
  display: flex; align-items: center; justify-content: center;
  z-index: 10000;
  transition: opacity .5s ease;
}
#boot .b-mark {
  font-family: "Bebas Neue", sans-serif;
  font-size: 48px;
  letter-spacing: .12em;
  color: #D97720;
  position: relative;
}
#boot .b-mark::after {
  content: "";
  position: absolute;
  left: 0; bottom: -8px;
  height: 2px; width: 0;
  background: #D97720;
  animation: load 1.2s ease forwards;
}
@keyframes load { to { width: 100%; } }
#boot.gone { opacity: 0; pointer-events: none; }

.divider-row {
  display: flex; align-items: center; gap: 16px;
  color: var(--ink-3); font-size: 11px;
  letter-spacing: .25em; text-transform: uppercase;
}
.divider-row::before, .divider-row::after {
  content: ""; flex: 1; height: 1px; background: var(--line);
}
</style>

    const onScroll = () => setScrolled(window.scrollY > 24);

    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  const goTo = (href) => (e) => {

const STEPS = ["Servicio", "Fecha", "Hora", "Tu vehículo"];
const MONTHS_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DAYS_ES   = ["L","M","X","J","V","S","D"];
const DAYS_FULL = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];

function takenForDate(date) {
  const seed = date.getFullYear() * 10000 + (date.getMonth()+1) * 100 + date.getDate();
  const rng = (n) => { let x = (seed * (n+1) * 9301 + 49297) % 233280; return x / 233280; };
  return (slotIdx) => rng(slotIdx) < 0.35;
}

function buildSlots(date) {
  const dow = date.getDay();
  if (dow === 0) return [];
  let start = 8, end = 18;
  if (dow === 6) { start = 8; end = 14; }
  const slots = [];
  for (let h = start; h < end; h++) {
    for (let m = 0; m < 60; m += 30) {
      const hh = h % 12 === 0 ? 12 : h % 12;
      const ampm = h < 12 ? "AM" : "PM";
      slots.push(`${hh}:${m.toString().padStart(2,"0")} ${ampm}`);
    }
  }
  return slots;
}

              <a href="tel:+12145550199" style={{ color: "var(--gold)", display: "inline-block", marginTop: 8 }}>(214) 555-0199</a>
            </div>
          </aside>

          <div className="bk-body" style={bkStyles.body}>
            {!done && (
              <div style={{ marginBottom: 28 }}>
                <span style={{ fontSize: 10, letterSpacing: ".25em", textTransform: "uppercase", color: "var(--ink-3)" }}>Paso {step+1} de 4</span>
                <h4 style={bkStyles.bodyTitle}>
                  {step === 0 && "Elegí el servicio"}
                  {step === 1 && "Elegí el día"}
                  {step === 2 && "Elegí la hora"}
                  {step === 3 && "Tu vehículo"}
                </h4>
                <p style={bkStyles.bodySub}>
                  {step === 0 && "¿No encontrás lo que buscás? Agregalo en notas."}
                  {step === 1 && "Domingos cerrado. Sábados hasta las 2pm."}
                  {step === 2 && "Slots tachados ya están tomados."}
                  {step === 3 && "Recibís confirmación por SMS al número que dejes."}
                </p>
              </div>
            )}

            {!done && step === 0 && (
              <div className="bk-svc-grid" style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 12 }}>
                {SERVICES.map(s => (
                  <div key={s.id} onClick={() => setServiceId(s.id)}
                       style={{ ...bkStyles.svcCard, ...(serviceId === s.id ? bkStyles.svcCardActive : {}) }}>
                    <div style={{ fontFamily: "var(--display)", fontSize: 22, letterSpacing: ".03em", textTransform: "uppercase", color: "var(--ink)" }}>{s.name}</div>
                    <div style={{ fontSize: 13, color: "var(--ink-2)", lineHeight: 1.5 }}>{s.desc}</div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: "auto", paddingTop: 10 }}>
                      <div style={{ fontSize: 12, color: "var(--ink-3)", letterSpacing: ".05em" }}><Icon name="clock" size={11} /> {s.duration} min</div>
                      <div style={{ fontFamily: "var(--display)", fontSize: 22, color: "var(--gold)", letterSpacing: ".02em" }}>${s.price}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {!done && step === 1 && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                  <button style={bkStyles.monthBtn} disabled={monthOffset === 0} onClick={() => setMonthOffset(m => Math.max(0, m-1))}>
                    <Icon name="arrow" size={14} style={{ transform: "rotate(180deg)" }} />
                  </button>
                  <div style={{ fontFamily: "var(--display)", fontSize: 22, letterSpacing: ".05em", color: "var(--ink)" }}>
                    {MONTHS_ES[monthDate.getMonth()]} {monthDate.getFullYear()}
                  </div>
                  <button style={bkStyles.monthBtn} disabled={monthOffset >= 2} onClick={() => setMonthOffset(m => Math.min(2, m+1))}>
                    <Icon name="arrow" size={14} />
                  </button>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6, marginBottom: 24 }}>
                  {DAYS_ES.map(d => <div key={d} style={{ fontSize: 10, color: "var(--ink-3)", textAlign: "center", letterSpacing: ".15em", textTransform: "uppercase", padding: "4px 0" }}>{d}</div>)}
                  {cells.map((d, i) => {
                    if (!d) return <div key={i} />;
                    const isPast = d < today;
                    const isClosed = d.getDay() === 0;
                    const isActive = date && d.getTime() === date.getTime();
                    const disabled = isPast || isClosed;
                    return (
                      <div key={i} onClick={() => !disabled && (setDate(d), setSlot(null))}
                           style={{ ...bkStyles.dayCell, ...(isPast ? bkStyles.dayCellPast : {}), ...(isClosed && !isPast ? bkStyles.dayCellClosed : {}), ...(isActive ? bkStyles.dayCellActive : {}) }}>
                        <div style={{ fontFamily: "var(--display)", fontSize: 22, letterSpacing: 0 }}>{d.getDate()}</div>
                        {isClosed && !isPast && <div style={{ fontSize: 9, letterSpacing: ".1em", marginTop: 2, opacity: .7 }}>cerrado</div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {!done && step === 2 && (
              <div>
                <div className="bk-slot-grid" style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8 }}>
                  {slots.map((sl, i) => {
                    const taken = isTaken(i);
                    const isActive = sl === slot;
                    return (
                      <button key={sl} onClick={() => !taken && setSlot(sl)} disabled={taken}
                              style={{ ...bkStyles.slot, ...(taken ? bkStyles.slotTaken : {}), ...(isActive ? bkStyles.slotActive : {}) }}>
                        {sl}
                      </button>
                    );
                  })}
                </div>
                <div style={{ marginTop: 20, fontSize: 12, color: "var(--ink-3)", display: "flex", gap: 24 }}>
                  <span><span style={{ display: "inline-block", width: 10, height: 10, background: "var(--gold)", marginRight: 8, verticalAlign: "middle" }} />Disponible</span>
                  <span><span style={{ display: "inline-block", width: 10, height: 10, background: "var(--bg-3)", border: "1px solid var(--line)", marginRight: 8, verticalAlign: "middle" }} />Ocupado</span>
                </div>
              </div>
            )}

            {!done && step === 3 && (
              <div>
                <div className="bk-form-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18 }}>
                  {[["Nombre","Tu nombre","name","text"],["Teléfono","(214) 555-0123","phone","tel"],].map(([lbl,ph,key,type]) => (
                    <div key={key} style={bkStyles.field}>
                      <label style={bkStyles.label}>{lbl}</label>
                      <input type={type} style={bkStyles.input} placeholder={ph} value={form[key]}
                             onChange={e => setForm({...form, [key]: e.target.value})}
                             onFocus={e => e.target.style.borderColor = "var(--gold)"}
                             onBlur={e => e.target.style.borderColor = "var(--line)"} />
                    </div>
                  ))}
                  <div style={{ ...bkStyles.field, gridColumn: "1 / -1" }}>
                    <label style={bkStyles.label}>Email</label>
                    <input type="email" style={bkStyles.input} placeholder="tu@email.com" value={form.email}
                           onChange={e => setForm({...form, email: e.target.value})}
                           onFocus={e => e.target.style.borderColor = "var(--gold)"}
                           onBlur={e => e.target.style.borderColor = "var(--line)"} />
                  </div>
                  <div style={bkStyles.field}>
                    <label style={bkStyles.label}>Marca del vehículo <span style={{ color: "var(--gold)" }}>*</span></label>
                    <input style={bkStyles.input} placeholder="Toyota, Ford, Chevy…" value={form.make}
                           onChange={e => setForm({...form, make: e.target.value})}
                           onFocus={e => e.target.style.borderColor = "var(--gold)"}
                           onBlur={e => e.target.style.borderColor = "var(--line)"} />
                  </div>
                  <div style={bkStyles.field}>
                    <label style={bkStyles.label}>Modelo <span style={{ color: "var(--gold)" }}>*</span></label>
                    <input style={bkStyles.input} placeholder="Camry, F-150, Silverado…" value={form.model}
                           onChange={e => setForm({...form, model: e.target.value})}
                           onFocus={e => e.target.style.borderColor = "var(--gold)"}
                           onBlur={e => e.target.style.borderColor = "var(--line)"} />
                  </div>
                  <div style={{ ...bkStyles.field, gridColumn: "1 / -1" }}>
                    <label style={bkStyles.label}>Año (opcional)</label>
                    <input style={bkStyles.input} placeholder="2019" value={form.year}
                           onChange={e => setForm({...form, year: e.target.value})}
                           onFocus={e => e.target.style.borderColor = "var(--gold)"}
                           onBlur={e => e.target.style.borderColor = "var(--line)"} />
                  </div>
                  <div style={{ ...bkStyles.field, gridColumn: "1 / -1" }}>
                    <label style={bkStyles.label}>Síntomas / notas (opcional)</label>
                    <textarea style={{ ...bkStyles.input, resize: "vertical", minHeight: 80 }}
                              placeholder="Ruidos, luces prendidas, qué falla…"
                              value={form.notes} onChange={e => setForm({...form, notes: e.target.value})}
                              onFocus={e => e.target.style.borderColor = "var(--gold)"}
                              onBlur={e => e.target.style.borderColor = "var(--line)"} />
                  </div>
                </div>
              </div>
            )}

            {done && (
              <div style={bkStyles.doneWrap}>
                <div style={bkStyles.doneCheck}><Icon name="check" size={32} /></div>
                <h3 style={bkStyles.doneTitle}>Cita confirmada.</h3>
                <p style={{ color: "var(--ink-2)", marginTop: 14, fontSize: 15, maxWidth: 420 }}>
                  Te llega un SMS a <strong style={{ color: "var(--gold)" }}>{form.phone}</strong>.<br />
                  Nos vemos pronto, {form.name.split(" ")[0]}.
                </p>
                <div style={bkStyles.doneSummary}>
                  <div style={bkStyles.doneRow}><span style={{ color: "var(--ink-3)" }}>Servicio</span><span><strong>{service.name}</strong> · ${service.price}</span></div>
                  <div style={bkStyles.doneRow}><span style={{ color: "var(--ink-3)" }}>Vehículo</span><span><strong>{form.year} {form.make} {form.model}</strong></span></div>
                  <div style={bkStyles.doneRow}><span style={{ color: "var(--ink-3)" }}>Fecha</span><span><strong>{DAYS_FULL[(date.getDay()+6)%7]} {date.getDate()} {MONTHS_ES[date.getMonth()]}</strong></span></div>
                  <div style={bkStyles.doneRow}><span style={{ color: "var(--ink-3)" }}>Hora</span><span><strong>{slot}</strong></span></div>
                  <div style={{ ...bkStyles.doneRow, borderBottom: "none" }}><span style={{ color: "var(--ink-3)" }}>Mecánico</span><span><strong>Carlos Cruz</strong></span></div>
                </div>
                <button className="btn btn--ghost" style={{ marginTop: 24 }}
                        onClick={() => { setDone(false); setStep(0); setServiceId(null); setDate(null); setSlot(null); setForm({ name:"",phone:"",email:"",make:"",model:"",year:"",notes:"" }); }}>
                  Agendar otra cita
                </button>
              </div>
            )}

            {!done && (
              <div style={{ marginTop: "auto", paddingTop: 28, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 16 }}>
                <button onClick={back} disabled={step === 0} className="btn btn--ghost" style={{ opacity: step === 0 ? .35 : 1 }}>Atrás</button>
                <div style={{ fontSize: 11, color: "var(--ink-3)", letterSpacing: ".15em", textTransform: "uppercase" }}>
                  {service && `${service.name} · $${service.price}`}
                </div>
                {step < 3 ? (
                  <button onClick={next} disabled={!valid[step]} className="btn"
                          style={{ opacity: valid[step] ? 1 : .4, cursor: valid[step] ? "pointer" : "not-allowed" }}>
                    Continuar <Icon name="arrow" size={14} />
                  </button>
                ) : (
                  <button onClick={confirm} disabled={!valid[3]} className="btn"
                          style={{ opacity: valid[3] ? 1 : .4, cursor: valid[3] ? "pointer" : "not-allowed" }}>
                    Confirmar cita <Icon name="check" size={14} />
                  </button>
                )}
              </div>
            )}
          </div>
        </div>
      </div>
      <style>{`
        @media (max-width: 900px) {
          .bk-head { grid-template-columns: 1fr !important; gap: 24px !important; }
          .bk-shell { grid-template-columns: 1fr !important; }
          .bk-side { border-right: none !important; border-bottom: 1px solid var(--line) !important; padding: 28px !important; }
          .bk-body { padding: 28px !important; }
          .bk-svc-grid { grid-template-columns: 1fr !important; }
          .bk-slot-grid { grid-template-columns: repeat(3, 1fr) !important; }
          .bk-form-grid { grid-template-columns: 1fr !important; }
        }
      `}</style>
    </section>
  );
}

/* ============================================================ GALLERY ============================================================ */
const GAL_TAGS = ["Todo", "Motor", "Frenos", "Llantas", "Suspensión", "Diagnóstico"];

function Gallery() {
  const [tab, setTab] = React.useState("Todo");
  const [open, setOpen] = React.useState(null);
  const [userPhotos, setUserPhotos] = React.useState([]);
  const fileRef = React.useRef(null);

  const all = [...userPhotos, ...GALLERY];
  const shown = tab === "Todo" ? all : all.filter(p => p.tag === tab);

  const onFile = (e) => {
    Array.from(e.target.files || []).forEach(f => {
      const reader = new FileReader();
      reader.onload = (ev) => setUserPhotos(prev => [{ src: ev.target.result, tag: "Mío", caption: f.name, user: true }, ...prev]);
      reader.readAsDataURL(f);
    });
    e.target.value = "";
  };

  return (
    <section id="gallery" className="section reveal" style={{ background: "var(--bg-2)", borderTop: "1px solid var(--line)", borderBottom: "1px solid var(--line)" }}>
      <div className="container">
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "end", marginBottom: 48, gap: 40, flexWrap: "wrap" }}>
          <div>
            <span className="eyebrow">Trabajo · 05</span>
            <h2 style={{ fontFamily: "var(--display)", fontSize: "clamp(48px, 7vw, 96px)", lineHeight: .92, letterSpacing: ".01em", textTransform: "uppercase", color: "var(--ink)", margin: "16px 0 0" }}>
              El portafolio<br /><em style={{ fontFamily: "var(--serif)", fontStyle: "italic", color: "var(--gold)", fontWeight: 400 }}>en vivo.</em>
            </h2>
            <p style={{ fontSize: 14, color: "var(--ink-2)", marginTop: 14, maxWidth: 480, lineHeight: 1.6 }}>
              Trabajos reales, clientes reales. Subí una foto de tu carro antes y después — la sumamos al feed.
            </p>
          </div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {GAL_TAGS.map(t => (
              <button key={t} onClick={() => setTab(t)}
                      style={{ padding: "10px 16px", border: "1px solid var(--line-2)", fontSize: 11, letterSpacing: ".18em", textTransform: "uppercase", color: "var(--ink-2)", cursor: "pointer", transition: "all .2s ease", fontWeight: 500, ...(tab === t ? { background: "var(--gold)", borderColor: "var(--gold)", color: "#0a0a0a" } : {}) }}>
                {t}
              </button>
            ))}
          </div>
        </div>

        <div className="gal-grid" style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8 }}>
          <div onClick={() => fileRef.current?.click()}
               style={{ aspectRatio: "1", border: "1.5px dashed var(--line-2)", background: "var(--bg-3)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12, cursor: "pointer", color: "var(--ink-3)", transition: "all .25s ease", textAlign: "center", padding: 16 }}
               onMouseEnter={e => { e.currentTarget.style.borderColor = "var(--gold)"; e.currentTarget.style.color = "var(--gold)"; }}
               onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--line-2)"; e.currentTarget.style.color = "var(--ink-3)"; }}>
            <Icon name="upload" size={28} />
            <div style={{ fontSize: 11, letterSpacing: ".18em", textTransform: "uppercase", fontWeight: 600 }}>Subí tu carro</div>
            <div style={{ fontSize: 11, color: "var(--ink-3)", lineHeight: 1.4 }}>Antes y después<br />JPG · PNG</div>
            <input ref={fileRef} type="file" accept="image/*" multiple style={{ display: "none" }} onChange={onFile} />
          </div>
          {shown.map((p, i) => (
            <div key={i} style={{ position: "relative", aspectRatio: "1", overflow: "hidden", cursor: "pointer", background: "var(--bg-3)" }}
                 onClick={() => setOpen(p)}
                 onMouseEnter={e => { e.currentTarget.querySelector("img").style.transform = "scale(1.05)"; e.currentTarget.querySelector(".gal-ov").style.opacity = "1"; }}
                 onMouseLeave={e => { e.currentTarget.querySelector("img").style.transform = "scale(1)"; e.currentTarget.querySelector(".gal-ov").style.opacity = "0"; }}>
              <img src={p.src} alt={p.caption} style={{ width: "100%", height: "100%", objectFit: "cover", transition: "transform .6s cubic-bezier(.22,.61,.36,1), filter .3s ease" }} />
              <div style={{ position: "absolute", top: 12, left: 12, padding: "4px 8px", background: "rgba(10,10,10,.7)", backdropFilter: "blur(4px)", color: "var(--gold)", fontSize: 9, letterSpacing: ".18em", textTransform: "uppercase", fontWeight: 600, border: "1px solid rgba(217,119,32,.3)" }}>{p.tag}</div>
              <div className="gal-ov" style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(0,0,0,.85) 0%, transparent 50%)", opacity: 0, transition: "opacity .3s ease", display: "flex", alignItems: "flex-end", padding: 16, color: "#f5f0e8" }}>
                <div style={{ fontSize: 13, fontWeight: 500 }}>{p.caption}</div>
              </div>
            </div>
          ))}
        </div>

        <div style={{ marginTop: 36, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 16, paddingTop: 24, borderTop: "1px solid var(--line)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 14, color: "var(--ink-2)" }}>
            <Icon name="instagram" size={18} style={{ color: "var(--gold)" }} />
            <span style={{ fontSize: 13 }}>Más trabajos en <strong style={{ color: "var(--ink)" }}>@cruzauto.dallas</strong></span>
          </div>
          <div style={{ fontSize: 11, color: "var(--ink-3)", letterSpacing: ".05em" }}>{all.length} trabajos · actualizado esta semana</div>
        </div>
      </div>

      {open && (
        <div style={{ position: "fixed", inset: 0, zIndex: 500, background: "rgba(0,0,0,.92)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }} onClick={() => setOpen(null)}>
          <button style={{ position: "absolute", top: 24, right: 24, width: 44, height: 44, border: "1px solid rgba(245,240,232,.3)", color: "#f5f0e8", display: "grid", placeItems: "center" }} onClick={() => setOpen(null)}>
            <Icon name="x" size={20} />
          </button>
          <img src={open.src} alt={open.caption} style={{ maxWidth: "min(90vw, 900px)", maxHeight: "85vh", objectFit: "contain" }} />
          <div style={{ position: "absolute", bottom: 32, left: 0, right: 0, textAlign: "center", color: "#f5f0e8" }}>
            <div style={{ fontFamily: "var(--display)", fontSize: 24, letterSpacing: ".05em", color: "var(--gold)" }}>{open.tag}</div>
            <div style={{ fontSize: 13, opacity: .7, marginTop: 4 }}>{open.caption}</div>
          </div>
        </div>
      )}
      <style>{`
        @media (max-width: 900px) { .gal-grid { grid-template-columns: repeat(3, 1fr) !important; } }
        @media (max-width: 600px) { .gal-grid { grid-template-columns: repeat(2, 1fr) !important; } }
      `}</style>
    </section>
  );
}

/* ============================================================ LOCATION ============================================================ */
function Location() {

/* ============================================================ APP ============================================================ */
function App() {
  const [theme, setTheme] = React.useState("dark");

  React.useEffect(() => { document.body.dataset.theme = theme; }, [theme]);

  React.useEffect(() => {
    const t = setTimeout(() => {
      const boot = document.getElementById("boot");
      if (boot) boot.classList.add("gone");
      setTimeout(() => boot && boot.remove(), 600);
    }, 800);
    return () => clearTimeout(t);
  }, []);

  React.useEffect(() => {
    let io;
    const setup = () => {
      io = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
      }, { threshold: 0, rootMargin: "0px 0px -8% 0px" });
      document.querySelectorAll(".reveal").forEach(el => io.observe(el));
      setTimeout(() => {
        document.querySelectorAll(".reveal:not(.in)").forEach(el => {
          if (el.getBoundingClientRect().top < window.innerHeight) el.classList.add("in");
        });
      }, 2000);
    };
    const t = setTimeout(setup, 100);
    return () => { clearTimeout(t); if (io) io.disconnect(); };
  }, []);

  return (
    <>
      <Nav theme={theme} onTheme={() => setTheme(t => t === "dark" ? "light" : "dark")} />
      <Hero />
      <About />
      <Services />
      <Booking />
      <Gallery />
      <Reviews />
      <Location />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
